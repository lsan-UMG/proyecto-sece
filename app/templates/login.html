<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SECE — Iniciar sesión</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background: #f3f4f6; font-size: .9rem; }
    .login-card {
      background: #fff;
      border: 1px solid #e5e7eb;
      border-radius: 10px;
      padding: 2.25rem 2rem;
    }
    .login-logo {
      width: 48px; height: 48px;
      background: #1e3a5f;
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 1.1rem;
      margin: 0 auto 1.25rem;
    }
    .login-title { font-weight: 700; font-size: 1.05rem; color: #111827; text-align: center; margin-bottom: .25rem; }
    .login-sub { font-size: .8rem; color: #9ca3af; text-align: center; margin-bottom: 1.75rem; }
    .form-label { font-size: .82rem; color: #374151; margin-bottom: .3rem; }
    .btn-sece { background: #1e3a5f; border-color: #1e3a5f; color: #fff; }
    .btn-sece:hover { background: #162e4d; border-color: #162e4d; color: #fff; }
  </style>
</head>
<body>
<div class="d-flex align-items-center justify-content-center min-vh-100">
  <div style="width:100%;max-width:380px;padding:1rem">
    <div class="login-card">
      <div class="login-logo">S</div>
      <div class="login-title">Sistema de Expediente Clínico</div>
      <div class="login-sub">Clínica Central · SECE</div>

      {% if error %}
      <div class="alert alert-danger py-2 px-3 mb-3" style="font-size:.82rem">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <div class="mb-3">
          <label class="form-label">Correo electrónico</label>
          <input type="email" name="email" class="form-control" required autofocus>
        </div>
        <div class="mb-4">
          <label class="form-label">Contraseña</label>
          <input type="password" name="password" class="form-control" required>
        </div>
        <button type="submit" class="btn btn-sece w-100">Ingresar</button>
      </form>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
