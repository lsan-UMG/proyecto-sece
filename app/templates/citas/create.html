{% extends "base.html" %}
{% block title %}SECE — Nueva cita{% endblock %}
{% block page_title %}Programar cita{% endblock %}

{% block content %}
<nav aria-label="breadcrumb">
  <ol class="breadcrumb">
    <li class="breadcrumb-item"><a href="/">Inicio</a></li>
    <li class="breadcrumb-item"><a href="/citas">Citas</a></li>
    <li class="breadcrumb-item active">Nueva cita</li>
  </ol>
</nav>

{% if error %}
<div class="alert alert-danger alert-dismissible mb-3 py-2 px-3" style="font-size:.85rem">
  {{ error }}
  <button type="button" class="btn-close btn-sm" data-bs-dismiss="alert"></button>
</div>
{% endif %}

<div class="content-card" style="max-width:560px">
  <div class="content-card-header"><span class="card-title">Datos de la cita</span></div>
  <div class="p-4">
    <form method="post" action="/citas/crear">
      <div class="row g-3">
        <div class="col-12">
          <label class="form-label">Paciente *</label>
          <select name="paciente_id" class="form-select" required>
            <option value="">Seleccionar paciente...</option>
            {% for p in pacientes %}
            <option value="{{ p.id }}" {% if p.id == paciente_id_sel %}selected{% endif %}>
              {{ p.nombre_completo }} — {{ p.codigo_expediente }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12">
          <label class="form-label">Médico *</label>
          <select name="medico_id" class="form-select" required>
            <option value="">Seleccionar médico...</option>
            {% for m in medicos %}
            <option value="{{ m.id }}">{{ m.usuario.nombre }} — {{ m.especialidad }}</option>
            {% endfor %}
          </select>
        </div>
        <div class="col-12">
          <label class="form-label">Fecha y hora *</label>
          <input type="datetime-local" name="fecha_hora" class="form-control" required>
        </div>
        <div class="col-12">
          <label class="form-label">Motivo</label>
          <input type="text" name="motivo" class="form-control">
        </div>
        <div class="col-12 d-flex gap-2 pt-1">
          <button type="submit" class="btn btn-sece">Programar cita</button>
          <a href="/citas" class="btn btn-outline-secondary">Cancelar</a>
        </div>
      </div>
    </form>
  </div>
</div>
{% endblock %}
